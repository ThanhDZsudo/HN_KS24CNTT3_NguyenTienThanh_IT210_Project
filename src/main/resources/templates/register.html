<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .form-control.is-invalid {
            background-image: none !important;
            padding-right: 0.75rem !important;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container card p-4 shadow-sm" style="max-width: 500px;">
    <h3 class="text-center mb-4">Tạo Tài Khoản</h3>

    <form th:action="@{/register}" method="post" th:object="${dto}">
        <div class="mb-3">
            <label class="form-label">Họ và tên</label>
            <input type="text" name="fullName" class="form-control" th:value="*{fullName}" th:classappend="${nameError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1" th:if="${nameError}" th:text="${nameError}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label d-block">Giới tính</label>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="male" value="Nam" th:checked="*{gender == 'Nam'}">
                <label class="form-check-label" for="male">Nam</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="female" value="Nữ" th:checked="*{gender == 'Nữ'}">
                <label class="form-check-label" for="female">Nữ</label>
            </div>
            <div class="text-danger small mt-1" th:if="${genderError}" th:text="${genderError}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" th:value="*{username}" th:classappend="${usernameError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1" th:if="${usernameError}" th:text="${usernameError}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input type="password" name="password" class="form-control" th:classappend="${passwordError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1" th:if="${passwordError}" th:text="${passwordError}"></div>
        </div>

        <div class="mb-4">
            <label class="form-label">Xác nhận mật khẩu</label>
            <input type="password" name="confirmPassword" class="form-control" th:classappend="${confirmError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1" th:if="${confirmError}" th:text="${confirmError}"></div>
        </div>

        <button type="submit" class="btn btn-success w-100">Đăng ký tài khoản</button>
    </form>
    <p class="mt-3 text-center">Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
</div>
</body>
</html>
