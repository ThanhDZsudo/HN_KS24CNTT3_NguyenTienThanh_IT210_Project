<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trang Chủ Bệnh Nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; }
        .stat-card { border: none; border-radius: 15px; transition: 0.3s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-house-medical me-2"></i>Trang Chủ Bệnh Nhân</a>
        <div class="d-flex align-items-center">
            <span class="text-white me-3">Xin chào, <strong th:text="${session.loggedInUser.profile.fullName}"></strong>!</span>
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2"><i class="fa-solid fa-user me-1"></i>Hồ sơ</a>
            <a th:href="@{/logout}" class="btn btn-danger btn-sm"><i class="fa-solid fa-power-off"></i></a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row g-4 justify-content-center">
        <div class="col-md-5">
            <div class="card stat-card shadow-sm p-4 text-center h-100" onclick="location.href='/patient/book-appointment'">
                <div class="display-4 text-primary mb-3"><i class="fa-solid fa-calendar-plus"></i></div>
                <h4 class="fw-bold">Đặt Lịch Khám</h4>
                <p class="text-muted">Chọn chuyên khoa, bác sĩ và thời gian khám phù hợp.</p>
                <span class="btn btn-primary rounded-pill mt-auto">Đặt Lịch Ngay</span>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card stat-card shadow-sm p-4 text-center h-100" onclick="location.href='/patient/medical-history'">
                <div class="display-4 text-success mb-3"><i class="fa-solid fa-file-medical"></i></div>
                <h4 class="fw-bold">Sổ Khám Bệnh</h4>
                <p class="text-muted">Xem lại lịch sử các lần khám và tình trạng chờ khám.</p>
                <span class="btn btn-success rounded-pill mt-auto">Tra Cứu</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
