<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Hồ Sơ Cá Nhân - Smart Healthcare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh; color: white; display: flex; align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .glass-card {
      background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
      padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      width: 100%; max-width: 750px; margin: auto;
    }
    .avatar-circle {
      width: 100px; height: 100px; background: linear-gradient(45deg, #11998e, #38ef7d);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 15px; font-size: 45px; box-shadow: 0 0 20px rgba(56, 239, 125, 0.4);
    }
    .form-control, .form-select {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.15) !important;
      color: white !important; border-radius: 12px; padding: 12px;
    }
    .form-control:focus, .form-select:focus {
      border-color: #38ef7d !important;
      box-shadow: 0 0 15px rgba(56, 239, 125, 0.2) !important;
    }
    .btn-submit {
      background: linear-gradient(45deg, #11998e, #38ef7d);
      border: none; color: white; font-weight: bold; border-radius: 12px;
      padding: 14px; transition: 0.3s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(56, 239, 125, 0.4); }
    .btn-glass {
      background: rgba(255,255,255,0.05); color: white;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
      padding: 12px; transition: 0.3s; font-weight: bold;
    }
    .btn-glass:hover { background: rgba(255,255,255,0.15); color: white; }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-card text-center">
    <div class="avatar-circle">
      <i class="fa-solid fa-user-user-doctor text-white" th:if="${session.loggedInUser.role.name() == 'DOCTOR'}"></i>
      <i class="fa-solid fa-user-injured text-white" th:unless="${session.loggedInUser.role.name() == 'DOCTOR'}"></i>
    </div>
    <h4 class="fw-bold mb-1" th:text="${profile.fullName}"></h4>
    <p class="text-uppercase tracking-wider small opacity-50 mb-4" th:text="${session.loggedInUser.role}"></p>

    <form th:action="@{/profile/update}" method="post" th:object="${profile}" novalidate class="text-start">

      <div class="row">
        <div class="col-md-8 mb-3">
          <label class="small opacity-75 mb-2 fw-bold">Họ và tên</label>
          <input type="text" th:field="*{fullName}" class="form-control" required placeholder="Nhập họ và tên...">
          <div th:if="${errorFullName}" class="text-warning small mt-1 fw-bold" th:text="${errorFullName}"></div>
        </div>
        <div class="col-md-4 mb-3">
          <label class="small opacity-75 mb-2 fw-bold">Giới tính</label>
          <select th:field="*{gender}" class="form-select">
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="small opacity-75 mb-2 fw-bold">Số điện thoại</label>
          <input type="text" th:field="*{phone}" class="form-control" required placeholder="Nhập số điện thoại...">
          <div th:if="${errorPhone}" class="text-warning small mt-1 fw-bold" th:text="${errorPhone}"></div>
        </div>
        <div class="col-md-6 mb-3">
          <label class="small opacity-75 mb-2 fw-bold">Email</label>
          <input type="email" th:field="*{email}" class="form-control" placeholder="Nhập địa chỉ email...">
          <div th:if="${errorEmail}" class="text-warning small mt-1 fw-bold" th:text="${errorEmail}"></div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-4">
          <label class="small opacity-75 mb-2 fw-bold">Ngày sinh</label>
          <input type="date" th:field="*{dateOfBirth}" class="form-control" required>
          <div th:if="${errorDateOfBirth}" class="text-warning small mt-1 fw-bold" th:text="${errorDateOfBirth}"></div>
        </div>
        <div class="col-md-6 mb-4">
          <label class="small opacity-75 mb-2 fw-bold">Địa chỉ</label>
          <input type="text" th:field="*{address}" class="form-control" placeholder="Tỉnh/Thành phố đang sinh sống...">
          <div th:if="${errorAddress}" class="text-warning small mt-1 fw-bold" th:text="${errorAddress}"></div>
        </div>
      </div>

      <div th:if="${success}" class="alert alert-success bg-success bg-opacity-20 border-0 text-white small fw-bold mb-3" th:text="${success}"></div>
      <div th:if="${error}" class="alert alert-danger bg-danger bg-opacity-20 border-0 text-white small fw-bold mb-3" th:text="${error}"></div>

      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-submit shadow-sm"><i class="fa-solid fa-floppy-disk me-2"></i>LƯU THAY ĐỔI</button>

        <a th:href="${session.loggedInUser.role.name() == 'ADMIN' ? '/admin/dashboard' : (session.loggedInUser.role.name() == 'DOCTOR' ? '/doctor/dashboard' : '/patient/dashboard')}"
           class="btn btn-glass text-center text-decoration-none">
          <i class="fa-solid fa-house me-2"></i>VỀ TRANG CHỦ
        </a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
