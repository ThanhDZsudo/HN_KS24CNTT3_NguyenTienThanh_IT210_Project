<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thống Kê - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364); min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0; }
        .glass-card { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); height: 100%; transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); border-color: #38ef7d; }
        .stat-icon { width: 60px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 25px; margin-bottom: 15px; }
        .btn-glass { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; padding: 10px 25px; font-weight: bold; transition: 0.3s; }
        .btn-glass:hover { background: rgba(255, 255, 255, 0.2); color: white; }
    </style>
</head>
<body>
<div class="container" style="max-width: 1200px;">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold"><i class="fa-solid fa-chart-pie text-success me-3"></i>Báo Cáo Thống Kê</h2>
        <a th:href="@{/admin/dashboard}" class="btn btn-glass"><i class="fa-solid fa-arrow-left me-2"></i>Quay lại</a>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="glass-card text-center">
                <div class="stat-icon bg-primary bg-opacity-25 text-primary mx-auto"><i class="fa-solid fa-user-injured"></i></div>
                <h6 class="opacity-75">Bệnh Nhân</h6>
                <h3 class="fw-bold" th:text="${totalPatients}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="glass-card text-center">
                <div class="stat-icon bg-success bg-opacity-25 text-success mx-auto"><i class="fa-solid fa-user-md"></i></div>
                <h6 class="opacity-75">Bác Sĩ</h6>
                <h3 class="fw-bold" th:text="${totalDoctors}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="glass-card text-center">
                <div class="stat-icon bg-warning bg-opacity-25 text-warning mx-auto"><i class="fa-solid fa-calendar-check"></i></div>
                <h6 class="opacity-75">Lượt Khám</h6>
                <h3 class="fw-bold" th:text="${totalAppointments}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="glass-card text-center border-success">
                <div class="stat-icon bg-info bg-opacity-25 text-info mx-auto"><i class="fa-solid fa-sack-dollar"></i></div>
                <h6 class="opacity-75">Doanh Thu</h6>
                <h4 class="fw-bold text-success" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT') + ' đ'}">0</h4>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="glass-card">
                <h5 class="fw-bold mb-4 text-info">Tăng Trưởng Doanh Thu</h5>
                <canvas id="revenueChart" height="250"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="glass-card">
                <h5 class="fw-bold mb-4 text-warning">Top Bác Sĩ Nổi Bật</h5>
                <canvas id="topDoctorChart" height="250"></canvas>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const revData = /*[[${revenueData}]]*/ [];
    const topDocData = /*[[${topDoctors}]]*/ [];

    // Biểu đồ doanh thu
    new Chart(document.getElementById('revenueChart'), {
        type: 'line',
        data: {
            labels: revData.map(d => "Tháng " + d.month),
            datasets: [{
                label: 'VNĐ',
                data: revData.map(d => d.total),
                borderColor: '#38ef7d',
                backgroundColor: 'rgba(56, 239, 125, 0.1)',
                fill: true, tension: 0.4, borderWidth: 3
            }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
    });

    // Biểu đồ bác sĩ
    new Chart(document.getElementById('topDoctorChart'), {
        type: 'bar',
        data: {
            labels: topDocData.map(d => d.doctorName),
            datasets: [{
                data: topDocData.map(d => d.appointmentCount),
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderRadius: 10
            }]
        },
        options: { plugins: { legend: { display: false } } }
    });
</script>
</body>
</html>
