<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thống Kê - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style> body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; } </style>
</head>
<body class="py-5">
<div class="container" style="max-width: 1200px;">

    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bolder text-dark mb-1"><i class="fa-solid fa-chart-line text-danger me-2"></i>Báo Cáo Thống Kê</h2>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary rounded-pill px-4 shadow-sm fw-bold">
            <i class="fa-solid fa-arrow-left me-2"></i>Quay lại Trang chủ
        </a>
    </div>

    <div class="row mb-4 g-4">
        <div class="col-md-3">
            <div class="card border-0 rounded-4 shadow-sm h-100 bg-white p-4 d-flex flex-row align-items-center">
                <i class="fa-solid fa-hospital-user fs-1 text-info me-3"></i>
                <div><h6 class="text-muted fw-bold mb-1">Bệnh Nhân</h6><h3 class="fw-bolder mb-0" th:text="${totalPatients}">0</h3></div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 rounded-4 shadow-sm h-100 bg-white p-4 d-flex flex-row align-items-center">
                <i class="fa-solid fa-user-md fs-1 text-primary me-3"></i>
                <div><h6 class="text-muted fw-bold mb-1">Bác Sĩ</h6><h3 class="fw-bolder mb-0" th:text="${totalDoctors}">0</h3></div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 rounded-4 shadow-sm h-100 bg-white p-4 d-flex flex-row align-items-center">
                <i class="fa-solid fa-calendar-check fs-1 text-warning me-3"></i>
                <div><h6 class="text-muted fw-bold mb-1">Lượt Đặt Khám</h6><h3 class="fw-bolder mb-0" th:text="${totalAppointments}">0</h3></div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 rounded-4 shadow-sm h-100 bg-white p-4 d-flex flex-row align-items-center">
                <i class="fa-solid fa-sack-dollar fs-1 text-success me-3"></i>
                <div><h6 class="text-muted fw-bold mb-1">Tổng Doanh Thu</h6><h4 class="fw-bolder mb-0 text-success" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</h4></div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card border-0 rounded-4 shadow-sm bg-white p-4 h-100">
                <h5 class="fw-bold text-dark mb-4">Top Bác Sĩ Nổi Bật</h5>
                <div style="height: 300px;"><canvas id="topDoctorChart"></canvas></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 rounded-4 shadow-sm bg-white p-4 h-100">
                <h5 class="fw-bold text-dark mb-4">Tăng Trưởng Doanh Thu</h5>
                <div style="height: 300px;"><canvas id="revenueChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // VẼ BIỂU ĐỒ TOP BÁC SĨ
    const topDoctorsList = /*[[${topDoctors}]]*/ [];
    new Chart(document.getElementById('topDoctorChart').getContext('2d'), {
        type: 'bar',
        data: {
            labels: topDoctorsList.map(doc => doc.doctorName),
            datasets: [{ label: 'Số ca khám', data: topDoctorsList.map(doc => doc.appointmentCount), backgroundColor: 'rgba(54, 162, 235, 0.8)', borderRadius: 6 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    // VẼ BIỂU ĐỒ TĂNG TRƯỞNG DOANH THU
    const rawRevenue = /*[[${revenueData}]]*/ [];
    new Chart(document.getElementById('revenueChart').getContext('2d'), {
        type: 'line',
        data: {
            labels: rawRevenue.map(item => "Tháng " + item.month),
            datasets: [{ label: 'Doanh thu (VNĐ)', data: rawRevenue.map(item => item.total), borderColor: '#198754', backgroundColor: 'rgba(25, 135, 84, 0.1)', fill: true, tension: 0.4 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
</script>
</body>
</html>
