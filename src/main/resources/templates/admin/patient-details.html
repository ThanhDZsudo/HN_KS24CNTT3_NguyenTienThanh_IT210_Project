<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết Bệnh nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-sm border-0 rounded-4 overflow-hidden mb-4">
        <div class="card-header bg-success text-white p-3">
            <h4 class="mb-0">Thông tin chi tiết: <span th:text="${patient.profile.fullName}"></span></h4>
        </div>
        <div class="card-body p-4">
            <div class="row">
                <div class="col-md-4 border-end">
                    <p><strong>Ngày sinh:</strong> <span th:text="${patient.profile.dateOfBirth}"></span></p>
                    <p><strong>Giới tính:</strong> <span th:text="${patient.profile.gender}"></span></p>
                </div>
                <div class="col-md-4 border-end">
                    <p><strong>Điện thoại:</strong> <span th:text="${patient.profile.phone}"></span></p>
                    <p><strong>Địa chỉ:</strong> <span th:text="${patient.profile.address}"></span></p>
                </div>
                <div class="col-md-4">
                    <p><strong>Tổng số lần khám:</strong> <span class="badge bg-primary" th:text="${appointments.size()}"></span></p>
                </div>
            </div>
        </div>
    </div>

    <h4 class="fw-bold mb-3">Lịch sử khám & Hẹn lịch</h4>
    <div class="table-responsive shadow-sm rounded-4 bg-white p-3">
        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th>Ngày/Giờ</th><th>Bác sĩ phụ trách</th><th>Chuyên khoa</th><th>Trạng thái</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${appointments}">
                <td th:text="${a.appointmentDate + ' ' + a.appointmentTime}"></td>
                <td th:text="${'BS. ' + a.doctor.profile.fullName}"></td>
                <td th:text="${a.specialty.name}"></td>
                <td>
                    <span th:if="${a.status == 'PENDING'}" class="badge bg-warning text-dark">Chờ khám</span>
                    <span th:if="${a.status == 'COMPLETED'}" class="badge bg-success">Đã khám xong</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <a th:href="@{/admin/patients}" class="btn btn-secondary mt-3">Quay lại danh sách</a>
</div>
</body>
</html>
