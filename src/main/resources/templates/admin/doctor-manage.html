<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản Lý Bác Sĩ - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .table-card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="py-4">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-primary"><i class="fa-solid fa-user-md me-2"></i>Danh Sách Bác Sĩ</h3>
        <div>
            <a th:href="@{/admin/doctor/create}" class="btn btn-primary rounded-pill px-4"><i class="fa-solid fa-plus me-2"></i>Thêm Bác Sĩ</a>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary rounded-pill px-3 ms-2">Quay lại</a>
        </div>
    </div>

    <div class="card table-card p-4 bg-white">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>Họ và Tên</th>
                <th>Chuyên Khoa</th>
                <th>Email</th>
                <th>Số Điện Thoại</th>
                <th>Trạng Thái</th>
                <th>Thao Tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="doctor : ${doctorPage.content}">
                <td class="fw-bold" th:text="${doctor.profile != null ? doctor.profile.fullName : 'Chưa cập nhật'}"></td>
                <td>
                    <span class="badge bg-info text-dark" th:text="${doctor.specialty != null ? doctor.specialty.name : 'Chưa xếp khoa'}"></span>
                </td>
                <td th:text="${doctor.profile != null ? doctor.profile.email : ''}"></td>
                <td th:text="${doctor.profile != null ? doctor.profile.phone : ''}"></td>
                <td>
                    <span th:if="${doctor.enabled}" class="badge bg-success">Hoạt động</span>
                    <span th:unless="${doctor.enabled}" class="badge bg-danger">Đã khóa</span>
                </td>
                <td>
                    <a th:href="@{/admin/doctor/toggle-status/{id}(id=${doctor.id})}"
                       class="btn btn-sm btn-outline-secondary">
                        <i th:class="${doctor.enabled ? 'fa-solid fa-lock' : 'fa-solid fa-lock-open'}"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${doctorPage.totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${doctorPage.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/doctors(page=${doctorPage.number - 1})}">Trước</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, doctorPage.totalPages - 1)}"
                    th:classappend="${i == doctorPage.number} ? 'active'">
                    <a class="page-link" th:href="@{/admin/doctors(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${doctorPage.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/doctors(page=${doctorPage.number + 1})}">Sau</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
