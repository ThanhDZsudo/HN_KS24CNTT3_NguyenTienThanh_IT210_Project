<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản Lý Bác Sĩ - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .table-card { border: none; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        .table th { padding: 18px 15px; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px; }
        .table td { padding: 15px; vertical-align: middle; font-size: 16px; }
        .page-link { border-radius: 8px; margin: 0 4px; color: #333; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: 500;}
        .page-item.active .page-link { background-color: #0d6efd; color: white; box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3); }
    </style>
</head>
<body class="py-4">
<div class="container" style="max-width: 1400px;">

    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <h2 class="fw-bold text-primary"><i class="fa-solid fa-user-md me-3"></i>Danh Sách Bác Sĩ</h2>
        <div>
            <a th:href="@{/admin/doctor/create}" class="btn btn-primary btn-lg rounded-pill px-4 shadow-sm"><i class="fa-solid fa-plus me-2"></i>Thêm Bác Sĩ</a>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary btn-lg rounded-pill px-4 ms-2 shadow-sm">Quay lại</a>
        </div>
    </div>

    <div class="card table-card p-4 bg-white">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th>Họ và Tên</th>
                <th>Chuyên Khoa</th>
                <th>Email</th>
                <th>Số Điện Thoại</th>
                <th>Trạng Thái</th>
                <th class="text-center">Thao Tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="doctor : ${doctorPage.content}">
                <td class="fw-bold text-dark" th:text="${doctor.profile != null ? doctor.profile.fullName : 'Chưa cập nhật'}"></td>
                <td><span class="badge bg-info text-dark px-3 py-2 rounded-pill" th:text="${doctor.specialty != null ? doctor.specialty.name : 'Chưa xếp khoa'}"></span></td>
                <td class="text-muted" th:text="${doctor.profile != null ? doctor.profile.email : ''}"></td>
                <td class="fw-semibold text-muted" th:text="${doctor.profile != null ? doctor.profile.phone : ''}"></td>
                <td>
                    <span th:if="${doctor.enabled}" class="badge bg-success px-3 py-2 rounded-pill">Hoạt động</span>
                    <span th:unless="${doctor.enabled}" class="badge bg-danger px-3 py-2 rounded-pill">Đã khóa</span>
                </td>
                <td class="text-center">
                    <a th:href="@{/admin/doctor/toggle-status/{id}(id=${doctor.id})}" class="btn btn-outline-secondary px-3 rounded-pill shadow-sm">
                        <i th:class="${doctor.enabled ? 'fa-solid fa-lock' : 'fa-solid fa-lock-open'}"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${doctorPage.totalPages > 1}" class="mt-5">
            <ul class="pagination justify-content-center mb-2">
                <li class="page-item" th:classappend="${doctorPage.first} ? 'disabled'">
                    <a class="page-link px-3 py-2" th:href="@{/admin/doctors(page=${doctorPage.number - 1})}"><i class="fa-solid fa-chevron-left"></i></a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, doctorPage.totalPages - 1)}" th:classappend="${i == doctorPage.number} ? 'active'">
                    <a class="page-link px-4 py-2" th:href="@{/admin/doctors(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${doctorPage.last} ? 'disabled'">
                    <a class="page-link px-3 py-2" th:href="@{/admin/doctors(page=${doctorPage.number + 1})}"><i class="fa-solid fa-chevron-right"></i></a>
                </li>
            </ul>
            <div class="text-center text-muted small">
                Hiển thị trang <span class="fw-bold" th:text="${doctorPage.number + 1}"></span> trên tổng số <span class="fw-bold" th:text="${doctorPage.totalPages}"></span> trang
            </div>
        </nav>
    </div>
</div>
</body>
</html>
