<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản Lý Kho Thuốc - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364); min-height: 100vh; color: white; padding: 40px 0; font-family: 'Segoe UI', sans-serif; }
        .glass-container { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .table { color: white; margin-bottom: 0; }
        .table thead th { background: rgba(0,0,0,0.4) !important; border-bottom: none; color: #ffc107 !important; text-transform: uppercase; padding: 15px; }
        .table td { border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; background: transparent !important; color: white !important; padding: 15px; }
        .btn-glow-warning { background: linear-gradient(45deg, #ffb347, #ffcc33); border: none; color: #000; font-weight: bold; border-radius: 20px; }
        .btn-glow-warning:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 193, 7, 0.5); }
        .btn-glass { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;}
        .pagination-container { background: rgba(0, 0, 0, 0.4); border-radius: 30px; padding: 5px 10px; display: inline-flex; }
        .pagination .page-link { background: transparent; border: none; color: white; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .pagination .page-item.active .page-link { background: #0dcaf0; color: #000; }
        .modal-content { background: rgba(20, 30, 48, 0.95); backdrop-filter: blur(20px); border-radius: 20px; color: white; }
    </style>
</head>
<body>
<div class="container" style="max-width: 1000px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-white"><i class="fa-solid fa-pills text-warning me-2"></i>Quản Lý Kho Thuốc</h3>
        <button class="btn btn-glow-warning px-4" data-bs-toggle="modal" data-bs-target="#addMedicineModal"><i class="fa-solid fa-plus me-1"></i>Thêm Thuốc Mới</button>
    </div>

    <div class="glass-container table-responsive p-0">
        <table class="table table-borderless text-center">
            <thead><tr><th>ID</th><th class="text-start">TÊN DƯỢC PHẨM</th><th>SỐ LƯỢNG</th><th>THAO TÁC</th></tr></thead>
            <tbody>
            <tr th:each="m : ${medicinePage.content}">
                <td th:text="${m.id}"></td>
                <td class="text-start fw-bold fs-5" th:text="${m.name}"></td>
                <td th:text="${m.quantity}"></td>
                <td>
                    <button class="btn btn-sm btn-outline-info rounded-circle me-2" data-bs-toggle="modal" th:data-bs-target="'#editMedicineModal' + ${m.id}"><i class="fa-solid fa-pen"></i></button>
                    <a th:href="@{/admin/medicines/delete/{id}(id=${m.id})}" class="btn btn-sm btn-outline-danger rounded-circle" onclick="return confirm('Xóa thuốc này?');"><i class="fa-solid fa-trash"></i></a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="text-center py-4" th:if="${medicinePage.totalPages > 1}">
            <div class="pagination-container">
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${medicinePage.first} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/admin/medicines(page=${medicinePage.number - 1})}"><i class="fa-solid fa-angle-left"></i></a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, medicinePage.totalPages - 1)}" th:classappend="${i == medicinePage.number} ? 'active' : ''">
                        <a class="page-link" th:href="@{/admin/medicines(page=${i})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${medicinePage.last} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/admin/medicines(page=${medicinePage.number + 1})}"><i class="fa-solid fa-angle-right"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addMedicineModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0 bg-transparent"><h5 class="modal-title fw-bold text-warning"><i class="fa-solid fa-plus-circle me-2"></i>Thêm Thuốc</h5></div>
            <form th:action="@{/admin/medicines/create}" method="post" novalidate>
                <div class="modal-body px-4">
                    <input type="text" name="name" class="form-control bg-dark border-secondary text-white mb-3" placeholder="Tên thuốc" required>
                    <input type="number" name="quantity" class="form-control bg-dark border-secondary text-white" placeholder="Số lượng" required>
                </div>
                <div class="modal-footer border-0 px-4 pb-4"><button class="btn btn-glass" data-bs-dismiss="modal">Hủy</button><button type="submit" class="btn btn-glow-warning">Lưu</button></div>
            </form>
        </div>
    </div>
</div>

<div th:each="m : ${medicinePage.content}">
    <div class="modal fade" th:id="'editMedicineModal' + ${m.id}" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 bg-transparent"><h5 class="modal-title fw-bold text-info"><i class="fa-solid fa-pen-to-square me-2"></i>Cập Nhật</h5></div>
                <form th:action="@{/admin/medicines/update/{id}(id=${m.id})}" method="post" novalidate>
                    <div class="modal-body px-4">
                        <input type="text" class="form-control bg-dark border-secondary text-white mb-3" th:value="${m.name}" readonly>
                        <input type="number" name="quantity" class="form-control bg-dark border-secondary text-white" th:value="${m.quantity}" required>
                    </div>
                    <div class="modal-footer border-0 px-4 pb-4"><button class="btn btn-glass" data-bs-dismiss="modal">Hủy</button><button type="submit" class="btn btn-outline-info text-white">Cập Nhật</button></div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
