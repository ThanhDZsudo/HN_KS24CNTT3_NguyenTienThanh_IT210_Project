<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh Mục Thuốc - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .table-card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .page-link { border-radius: 8px; margin: 0 3px; color: #333; }
        .page-item.active .page-link { background-color: #ffc107; border-color: #ffc107; color: #000; }
    </style>
</head>
<body class="py-4">
<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-dark"><i class="fa-solid fa-pills text-warning me-2"></i>Quản Lý Kho Thuốc</h3>
        <div>
            <a href="#" class="btn btn-warning fw-bold text-dark rounded-pill px-4 me-2">
                <i class="fa-solid fa-plus me-1"></i> Thêm Thuốc
            </a>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary rounded-pill px-4">Quay lại</a>
        </div>
    </div>

    <div class="card table-card p-4 bg-white">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th style="width: 80px;">ID</th>
                <th>Tên Thuốc</th>
                <th>Đơn Vị</th>
                <th>Công Dụng / Mô Tả</th>
                <th class="text-center">Thao Tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="med : ${medicinePage.content}">
                <td class="text-muted fw-bold" th:text="${med.id}"></td>
                <td class="fw-bold text-primary" th:text="${med.name}"></td>
                <td><span class="badge bg-secondary px-3" th:text="${med.unit}"></span></td>
                <td th:text="${med.description}"></td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-primary me-1"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${medicinePage.totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${medicinePage.first} ? 'disabled'">
                    <a class="page-link shadow-sm" th:href="@{/admin/medicines(page=${medicinePage.number - 1})}">
                        <i class="fa-solid fa-chevron-left"></i>
                    </a>
                </li>

                <li class="page-item" th:each="i : ${#numbers.sequence(0, medicinePage.totalPages - 1)}"
                    th:classappend="${i == medicinePage.number} ? 'active'">
                    <a class="page-link shadow-sm fw-bold" th:href="@{/admin/medicines(page=${i})}" th:text="${i + 1}"></a>
                </li>

                <li class="page-item" th:classappend="${medicinePage.last} ? 'disabled'">
                    <a class="page-link shadow-sm" th:href="@{/admin/medicines(page=${medicinePage.number + 1})}">
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="text-center mt-3 text-muted small">
            Hiển thị trang <span th:text="${medicinePage.number + 1}"></span>
            trên tổng số <span th:text="${medicinePage.totalPages}"></span> trang
        </div>
    </div>
</div>
</body>
</html>
