<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh Mục Thuốc - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .table-card { border: none; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        .table th { padding: 18px 15px; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px; }
        .table td { padding: 15px; vertical-align: middle; font-size: 16px; }
        .page-link { border-radius: 8px; margin: 0 4px; color: #333; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: 500;}
        .page-item.active .page-link { background-color: #ffc107; color: black; box-shadow: 0 4px 10px rgba(255, 193, 7, 0.3); }
    </style>
</head>
<body class="py-4">
<div class="container" style="max-width: 1400px;">

    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <h2 class="fw-bold text-dark"><i class="fa-solid fa-pills text-warning me-3"></i>Quản Lý Kho Thuốc</h2>
        <div>
            <button class="btn btn-warning btn-lg fw-bold text-dark rounded-pill px-4 me-2 shadow-sm"
                    data-bs-toggle="modal" data-bs-target="#medicineModal" onclick="prepareAdd()">
                <i class="fa-solid fa-plus me-2"></i>Thêm Thuốc
            </button>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary btn-lg rounded-pill px-4 shadow-sm">Quay lại</a>
        </div>
    </div>

    <div th:if="${param.success}" class="alert alert-success shadow-sm rounded-pill px-4 fw-bold"><i class="fa-solid fa-check-circle me-2"></i>Thao tác thành công!</div>
    <div th:if="${param.deleted}" class="alert alert-danger shadow-sm rounded-pill px-4 fw-bold"><i class="fa-solid fa-trash me-2"></i>Đã xóa thuốc khỏi hệ thống!</div>

    <div class="card table-card p-4 bg-white">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th style="width: 80px;">ID</th>
                <th>Tên Thuốc</th>
                <th>Đơn Vị</th>
                <th class="text-center">Số Lượng</th>
                <th>Công Dụng / Mô Tả</th>
                <th class="text-center">Thao Tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="med : ${medicinePage.content}">
                <td class="text-muted fw-bold" th:text="${med.id}"></td>
                <td class="fw-bold text-primary fs-5" th:text="${med.name}"></td>
                <td><span class="badge bg-secondary px-3 py-2 rounded-pill" th:text="${med.unit}"></span></td>

                <td class="text-center">
                    <span th:if="${med.quantity > 10}" class="badge bg-success px-3 py-2 rounded-pill fs-6" th:text="${med.quantity}"></span>
                    <span th:if="${med.quantity > 0 and med.quantity <= 10}" class="badge bg-warning text-dark px-3 py-2 rounded-pill fs-6" th:text="${med.quantity} + ' (Sắp hết)'"></span>
                    <span th:if="${med.quantity == 0 or med.quantity == null}" class="badge bg-danger px-3 py-2 rounded-pill fs-6">Hết hàng</span>
                </td>

                <td class="text-muted" th:text="${med.description}"></td>
                <td class="text-center">
                    <button class="btn btn-outline-primary px-3 rounded-pill shadow-sm me-1"
                            th:data-id="${med.id}"
                            th:data-name="${med.name}"
                            th:data-unit="${med.unit}"
                            th:data-quantity="${med.quantity}"
                            th:data-desc="${med.description}"
                            onclick="prepareEdit(this)">
                        <i class="fa-solid fa-pen"></i> Sửa
                    </button>

                    <a th:href="@{/admin/medicines/delete/{id}(id=${med.id})}"
                       class="btn btn-outline-danger px-3 rounded-pill shadow-sm"
                       onclick="return confirm('Bạn có chắc chắn muốn xóa loại thuốc này không?');">
                        <i class="fa-solid fa-trash"></i> Xóa
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${medicinePage.totalPages > 1}" class="mt-5">
            <ul class="pagination justify-content-center mb-2">
                <li class="page-item" th:classappend="${medicinePage.first} ? 'disabled'">
                    <a class="page-link px-3 py-2" th:href="@{/admin/medicines(page=${medicinePage.number - 1})}"><i class="fa-solid fa-chevron-left"></i></a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, medicinePage.totalPages - 1)}" th:classappend="${i == medicinePage.number} ? 'active'">
                    <a class="page-link px-4 py-2" th:href="@{/admin/medicines(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${medicinePage.last} ? 'disabled'">
                    <a class="page-link px-3 py-2" th:href="@{/admin/medicines(page=${medicinePage.number + 1})}"><i class="fa-solid fa-chevron-right"></i></a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<div class="modal fade" id="medicineModal" tabindex="-1" aria-labelledby="medicineModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header bg-warning text-dark border-0 rounded-top-4">
                <h5 class="modal-title fw-bold" id="medicineModalLabel">Thông Tin Thuốc</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form th:action="@{/admin/medicines/save}" th:object="${dto}" method="post" class="needs-validation" novalidate id="medicineForm">
                <div class="modal-body p-4">
                    <input type="hidden" th:field="*{id}" id="medId">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên Thuốc <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg bg-light" th:field="*{name}" id="medName" required minlength="2" pattern=".*\S+.*">
                        <div class="invalid-feedback">Vui lòng nhập tên thuốc.</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Đơn Vị Tính <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-lg bg-light" th:field="*{unit}" id="medUnit" required pattern=".*\S+.*">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Số Lượng <span class="text-danger">*</span></label>
                            <input type="number" class="form-control form-control-lg bg-light" th:field="*{quantity}" id="medQuantity" required min="0">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Công Dụng / Mô Tả</label>
                        <textarea class="form-control bg-light" th:field="*{description}" id="medDesc" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill px-4 fw-bold" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-warning text-dark rounded-pill px-4 fw-bold shadow-sm">Lưu Dữ Liệu</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Hàm chuẩn bị dữ liệu khi ấn nút SỬA
    function prepareEdit(btn) {
        document.getElementById('medicineModalLabel').innerText = "Sửa Thông Tin Thuốc";
        document.getElementById('medId').value = btn.getAttribute('data-id');
        document.getElementById('medName').value = btn.getAttribute('data-name');
        document.getElementById('medUnit').value = btn.getAttribute('data-unit');
        document.getElementById('medQuantity').value = btn.getAttribute('data-quantity');
        document.getElementById('medDesc').value = btn.getAttribute('data-desc');

        var myModal = new bootstrap.Modal(document.getElementById('medicineModal'));
        myModal.show();
    }

    // Hàm reset form khi ấn nút THÊM MỚI
    function prepareAdd() {
        document.getElementById('medicineModalLabel').innerText = "Thêm Thuốc Mới";
        document.getElementById('medId').value = "";
        document.getElementById('medicineForm').reset();
    }

    // Bootstrap Validation Script
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>

</body>
</html>
