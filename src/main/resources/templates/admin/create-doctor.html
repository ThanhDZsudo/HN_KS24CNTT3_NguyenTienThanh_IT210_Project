<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cấp Tài Khoản Bác Sĩ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-control.is-invalid, .form-select.is-invalid {
            background-image: none !important;
            padding-right: 0.75rem !important;
        }
    </style>
</head>
<body class="bg-light py-5">
<div class="container card p-4 shadow-sm mx-auto" style="max-width: 600px;">
    <h3 class="text-center mb-4 text-primary">Tạo Tài Khoản Bác Sĩ</h3>

    <form th:action="@{/admin/doctor/create}" method="post" th:object="${dto}">
        <div class="mb-3">
            <label class="form-label fw-bold">Họ và tên Bác sĩ</label>
            <input type="text" name="fullName" class="form-control" th:value="*{fullName}" th:classappend="${nameError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1" th:if="${nameError}" th:text="${nameError}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label d-block fw-bold">Giới tính</label>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="male" value="Nam" th:checked="*{gender == 'Nam'}">
                <label class="form-check-label" for="male">Nam</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="female" value="Nữ" th:checked="*{gender == 'Nữ'}">
                <label class="form-check-label" for="female">Nữ</label>
            </div>
            <div class="text-danger small mt-1" th:if="${genderError}" th:text="${genderError}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Chuyên khoa phụ trách</label>
            <select name="specialtyId" class="form-select" th:classappend="${specialtyError} ? 'is-invalid' : ''">
                <option value="">-- Chọn chuyên khoa --</option>
                <option th:each="s : ${specialties}" th:value="${s.id}" th:text="${s.name}" th:selected="${dto.specialtyId != null and dto.specialtyId == s.id}"></option>
            </select>
            <div class="text-danger small mt-1" th:if="${specialtyError}" th:text="${specialtyError}"></div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="text" name="email" class="form-control" th:value="*{email}" th:classappend="${emailError} ? 'is-invalid' : ''">
                <div class="text-danger small mt-1" th:if="${emailError}" th:text="${emailError}"></div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Số điện thoại</label>
                <input type="text" name="phone" class="form-control" th:value="*{phone}" th:classappend="${phoneError} ? 'is-invalid' : ''">
                <div class="text-danger small mt-1" th:if="${phoneError}" th:text="${phoneError}"></div>
            </div>
        </div>

        <hr>

        <div class="mb-3">
            <label class="form-label fw-bold">Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" th:value="*{username}" th:classappend="${usernameError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1" th:if="${usernameError}" th:text="${usernameError}"></div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Mật khẩu khởi tạo</label>
            <input type="password" name="password" class="form-control" th:classappend="${passwordError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1" th:if="${passwordError}" th:text="${passwordError}"></div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Cấp tài khoản</button>
        <a th:href="@{/admin/doctors}" class="btn btn-outline-secondary w-100 mt-2">Hủy / Quay lại</a>
    </form>
</div>
</body>
</html>
