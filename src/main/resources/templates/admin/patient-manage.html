<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản Lý Bệnh Nhân - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .table-card { border: none; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        .table th { padding: 18px 15px; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px; }
        .table td { padding: 15px; vertical-align: middle; font-size: 16px; }
        .page-link { border-radius: 8px; margin: 0 4px; color: #333; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: 500;}
        .page-item.active .page-link { background-color: #198754; color: white; box-shadow: 0 4px 10px rgba(25, 135, 84, 0.3); }
    </style>
</head>
<body class="py-4">
<div class="container" style="max-width: 1400px;">

    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <h2 class="fw-bold text-success"><i class="fa-solid fa-hospital-user me-3"></i>Hồ Sơ Bệnh Nhân</h2>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary btn-lg rounded-pill px-5 shadow-sm">Quay lại</a>
    </div>

    <div class="card table-card p-4 bg-white">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th>Họ và Tên</th>
                <th>Giới Tính</th>
                <th>Ngày Sinh</th>
                <th>Số Điện Thoại</th>
                <th>Địa Chỉ</th>
                <th class="text-center">Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="patient : ${patientPage.content}">
                <td class="fw-bold text-dark" th:text="${patient.profile != null ? patient.profile.fullName : 'Chưa cập nhật'}"></td>
                <td class="text-muted" th:text="${patient.profile != null ? patient.profile.gender : ''}"></td>
                <td class="text-muted" th:text="${patient.profile != null ? patient.profile.dateOfBirth : ''}"></td>
                <td class="fw-semibold text-muted" th:text="${patient.profile != null ? patient.profile.phone : ''}"></td>
                <td class="text-muted" th:text="${patient.profile != null ? patient.profile.address : ''}"></td>
                <td class="text-center">
                    <a th:href="@{/admin/patients/{id}(id=${patient.id})}" class="btn btn-success px-4 rounded-pill shadow-sm">
                        <i class="fa-solid fa-eye me-2"></i>Chi tiết
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${patientPage.totalPages > 1}" class="mt-5">
            <ul class="pagination justify-content-center mb-2">
                <li class="page-item" th:classappend="${patientPage.first} ? 'disabled'">
                    <a class="page-link px-3 py-2" th:href="@{/admin/patients(page=${patientPage.number - 1})}"><i class="fa-solid fa-chevron-left"></i></a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, patientPage.totalPages - 1)}" th:classappend="${i == patientPage.number} ? 'active'">
                    <a class="page-link px-4 py-2" th:href="@{/admin/patients(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${patientPage.last} ? 'disabled'">
                    <a class="page-link px-3 py-2" th:href="@{/admin/patients(page=${patientPage.number + 1})}"><i class="fa-solid fa-chevron-right"></i></a>
                </li>
            </ul>
            <div class="text-center text-muted small">
                Hiển thị trang <span class="fw-bold" th:text="${patientPage.number + 1}"></span> trên tổng số <span class="fw-bold" th:text="${patientPage.totalPages}"></span> trang
            </div>
        </nav>
    </div>
</div>
</body>
</html>
