<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản Lý Bệnh Nhân - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            min-height: 100vh; color: #e9ecef;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass-container {
            background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            animation: slideUp 0.8s ease forwards; opacity: 0; transform: translateY(30px);
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .table { color: white; margin-bottom: 0; }
        .table thead th { background: rgba(0,0,0,0.4) !important; border-bottom: none; color: #00c6ff !important; text-transform: uppercase; letter-spacing: 1px; padding: 18px 15px; }
        .table tbody tr { transition: 0.3s; }
        .table tbody tr:hover { background: rgba(255,255,255,0.08) !important; transform: scale(1.01); }
        .table td { border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; background: transparent !important; color: white !important; padding: 15px; }

        .btn-glass { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; font-weight: bold;}
        .btn-glass:hover { background: rgba(255,255,255,0.2); color: white; }
        .btn-glow-info { background: linear-gradient(45deg, #00c6ff, #0072ff); border: none; color: white; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,198,255,0.3); font-weight: bold;}
        .btn-glow-info:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,198,255,0.5); color: white;}

        .pagination .page-link { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; margin: 0 4px; border-radius: 8px; transition: 0.3s;}
        .pagination .page-link:hover { background: rgba(255,255,255,0.2); color: #00c6ff; }
        .pagination .page-item.active .page-link { background: #00c6ff; color: #0f2027; border-color: #00c6ff; box-shadow: 0 0 15px rgba(0,198,255,0.5); font-weight: bold;}
        .pagination .page-item.disabled .page-link { background: rgba(0,0,0,0.1); color: rgba(255,255,255,0.3); border-color: transparent;}
    </style>
</head>
<body class="py-5">
<div class="container" style="max-width: 1200px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bolder text-white text-shadow"><i class="fa-solid fa-hospital-user text-info me-3"></i>Danh Sách Bệnh Nhân</h2>
        <a th:href="@{/admin/dashboard}" class="btn btn-glass rounded-pill px-4 shadow-sm"><i class="fa-solid fa-arrow-left me-2"></i>Trang chủ</a>
    </div>

    <div class="glass-container table-responsive overflow-hidden">
        <table class="table table-borderless align-middle">
            <thead>
            <tr>
                <th width="50" class="text-center">#</th>
                <th>Thông tin Bệnh nhân</th>
                <th>Ngày sinh & Giới tính</th>
                <th>Liên hệ & Địa chỉ</th>
                <th class="text-center">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="patient, iterStat : ${patientPage.content}">
                <td class="text-center opacity-75 fw-bold" th:text="${iterStat.count}"></td>
                <td>
                    <div class="fw-bold fs-5 text-white"><i class="fa-solid fa-user-injured me-2 text-info opacity-75"></i><span th:text="${patient.profile.fullName}"></span></div>
                    <div class="small opacity-75 mt-1"><i class="fa-regular fa-id-card me-1"></i>ID: <span th:text="${patient.username}"></span></div>
                </td>
                <td class="opacity-75">
                    <div><i class="fa-regular fa-calendar-days fa-fw me-1"></i><span th:text="${patient.profile.dateOfBirth}"></span></div>
                    <div class="mt-1"><i class="fa-solid fa-venus-mars fa-fw me-1"></i><span th:text="${patient.profile.gender}"></span></div>
                </td>
                <td class="opacity-75">
                    <div><i class="fa-solid fa-phone fa-fw me-1 text-success"></i><span th:text="${patient.profile.phone}"></span></div>
                    <div class="mt-1"><i class="fa-solid fa-envelope fa-fw me-1 text-warning"></i><span th:text="${patient.profile.email != null and !patient.profile.email.isEmpty() ? patient.profile.email : 'Chưa cập nhật'}"></span></div>
                    <div class="mt-1"><i class="fa-solid fa-location-dot fa-fw me-1 text-danger"></i><span th:text="${patient.profile.address != null and !patient.profile.address.isEmpty() ? patient.profile.address : 'Chưa cập nhật'}"></span></div>
                </td>
                <td class="text-center">
                    <a th:href="@{/admin/patients/{id}(id=${patient.id})}" class="btn btn-glow-info btn-sm rounded-pill px-4">
                        <i class="fa-solid fa-eye me-2"></i>Xem Chi Tiết
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${patientPage.totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center mb-0">
                <li class="page-item" th:classappend="${patientPage.first} ? 'disabled'">
                    <a class="page-link px-3 py-2" th:href="@{/admin/patients(page=${patientPage.number - 1})}"><i class="fa-solid fa-chevron-left"></i></a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, patientPage.totalPages - 1)}" th:classappend="${i == patientPage.number} ? 'active'">
                    <a class="page-link px-4 py-2" th:href="@{/admin/patients(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${patientPage.last} ? 'disabled'">
                    <a class="page-link px-3 py-2" th:href="@{/admin/patients(page=${patientPage.number + 1})}"><i class="fa-solid fa-chevron-right"></i></a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
