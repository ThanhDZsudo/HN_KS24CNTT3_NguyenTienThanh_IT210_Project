<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .form-control.is-invalid {
            background-image: none !important;
            padding-right: 0.75rem !important;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container card p-4 shadow-sm" style="max-width: 400px;">
    <h3 class="text-center mb-4">Đăng Nhập</h3>

    <div th:if="${param.success}" class="alert alert-success text-center">Đăng ký thành công! Hãy đăng nhập.</div>
    <div th:if="${loginError}" class="alert alert-danger text-center" th:text="${loginError}"></div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" th:value="${oldUsername}" th:classappend="${usernameError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1" th:if="${usernameError}" th:text="${usernameError}"></div>
        </div>
        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <input type="password" name="password" class="form-control" th:classappend="${passwordError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1" th:if="${passwordError}" th:text="${passwordError}"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Vào hệ thống</button>
    </form>
    <p class="mt-3 text-center">Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p>
</div>
</body>
</html>
