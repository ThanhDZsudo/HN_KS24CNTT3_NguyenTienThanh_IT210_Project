<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            /* Chuyển sang tone xanh đen trầm, cực kỳ dịu mắt */
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Thẻ kính mờ nhưng nền tối (Dark Glass) */
        .glass-card {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            color: #e9ecef;
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: #38ef7d;
            color: white;
            box-shadow: 0 0 10px rgba(56, 239, 125, 0.2);
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.4); }
        .form-control.is-invalid { background-image: none !important; border-color: #ff4757; }

        .btn-glow {
            /* Màu xanh lá trầm, không chói */
            background: linear-gradient(45deg, #11998e, #38ef7d);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            padding: 12px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.3);
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.5);
            color: white;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="text-center mb-4">
        <i class="fa-solid fa-heart-pulse text-success" style="font-size: 50px;"></i>
        <h3 class="fw-bold mt-3 text-white">Smart Healthcare</h3>
        <p class="opacity-75 small">Đăng nhập để tiếp tục</p>
    </div>

    <input type="hidden" id="errorMsg" th:value="${loginError}">
    <input type="hidden" id="successMsg" th:if="${param.success}" value="Đăng ký thành công! Hãy đăng nhập.">

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold opacity-75"><i class="fa-solid fa-user me-2"></i>Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập..." th:value="${oldUsername}" th:classappend="${usernameError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1 fw-bold" th:if="${usernameError}" th:text="${usernameError}" style="color: #ff4757 !important;"></div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold opacity-75"><i class="fa-solid fa-lock me-2"></i>Mật khẩu</label>
            <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu..." th:classappend="${passwordError} ? 'is-invalid' : ''">
            <div class="text-danger small mt-1 fw-bold" th:if="${passwordError}" th:text="${passwordError}" style="color: #ff4757 !important;"></div>
        </div>
        <button type="submit" class="btn btn-glow w-100 mb-3"><i class="fa-solid fa-right-to-bracket me-2"></i>Đăng Nhập</button>
        <div class="text-center">
            <span class="opacity-50 small">Chưa có tài khoản?</span>
            <a th:href="@{/register}" class="text-success text-decoration-none fw-bold ms-1">Đăng ký ngay</a>
        </div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const errorMsg = document.getElementById('errorMsg').value;
        const successMsg = document.getElementById('successMsg') ? document.getElementById('successMsg').value : null;

        if (errorMsg && errorMsg.trim() !== '') {
            Swal.fire({
                icon: 'error',
                title: 'Oops...',
                text: errorMsg,
                background: '#fff',
                backdrop: 'rgba(0,0,0,0.6)',
                showConfirmButton: false,
                timer: 2500,
                customClass: { popup: 'rounded-4 shadow-lg' }
            });
        }

        if (successMsg) {
            Swal.fire({
                icon: 'success',
                title: 'Tuyệt vời!',
                text: successMsg,
                showConfirmButton: false,
                timer: 2500,
                customClass: { popup: 'rounded-4 shadow-lg' }
            });
        }
    });
</script>
</body>
</html>
