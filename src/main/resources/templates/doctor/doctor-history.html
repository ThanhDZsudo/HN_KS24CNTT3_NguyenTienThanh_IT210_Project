<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tra Cứu Bệnh Án - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364); min-height: 100vh; color: white; padding: 40px 0; font-family: 'Segoe UI', sans-serif; }
        .glass-container { background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .table { color: white; margin-bottom: 0; }
        .table thead th { background: rgba(0,0,0,0.4) !important; color: #38ef7d !important; border: none; padding: 15px; }
        .table td { border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; padding: 15px; background: transparent !important; color: white !important;}
        .table tbody tr:hover { background: rgba(255,255,255,0.05) !important; }
        .pres-box { background: rgba(255,255,255,0.05); border-left: 3px solid #38ef7d; padding: 10px; border-radius: 5px; font-size: 0.85rem; white-space: pre-wrap; margin: 0; color: #a5dff9;}
    </style>
</head>
<body>
<div class="container" style="max-width: 1200px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-success"><i class="fa-solid fa-laptop-medical me-2"></i>Tra Cứu Bệnh Án Đã Khám</h3>
        <a href="/" class="btn btn-outline-light rounded-pill px-4"><i class="fa-solid fa-house me-2"></i>Trang chủ</a>
    </div>

    <div class="glass-container table-responsive overflow-hidden">
        <table class="table table-borderless align-middle">
            <thead>
            <tr>
                <th>Thời gian khám</th>
                <th>Bệnh nhân</th>
                <th width="30%">Chẩn đoán</th>
                <th width="35%">Đơn thuốc đã kê</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${history}">
                <td>
                    <div class="fw-bold text-white fs-6" th:text="${a.appointmentDate}"></div>
                    <div class="small opacity-50"><i class="fa-solid fa-clock me-1"></i><span th:text="${a.appointmentTime}"></span></div>
                </td>
                <td>
                    <div class="fw-bold text-info fs-5"><i class="fa-solid fa-user-injured me-2 opacity-75"></i><span th:text="${a.patient.profile.fullName}"></span></div>
                    <div class="small opacity-75 mt-1"><i class="fa-solid fa-phone me-1"></i><span th:text="${a.patient.profile.phone}"></span></div>
                </td>
                <td>
                    <div th:if="${a.medicalRecord != null}">
                        <div class="fw-bold text-warning small mb-1">Triệu chứng:</div>
                        <div class="small opacity-75 mb-2" th:text="${a.medicalRecord.symptoms}"></div>
                        <div class="fw-bold text-danger small mb-1">Kết luận:</div>
                        <div class="fw-bold" th:text="${a.medicalRecord.diagnosis}"></div>
                    </div>
                    <div th:if="${a.medicalRecord == null}" class="fst-italic opacity-50 small">Đang cập nhật...</div>
                </td>
                <td>
                    <div th:if="${a.medicalRecord != null}">
                        <pre class="pres-box" th:text="${a.medicalRecord.prescription}"></pre>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(history)}">
                <td colspan="4" class="text-center py-5 opacity-50">
                    <i class="fa-solid fa-folder-open fs-1 mb-3"></i>
                    <h5>Chưa có lịch sử khám bệnh nào.</h5>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
