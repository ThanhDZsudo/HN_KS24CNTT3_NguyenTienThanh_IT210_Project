<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trang Chủ Bác Sĩ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; }
        .stat-card { border: none; border-radius: 15px; transition: 0.3s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-user-doctor me-2"></i>BS. <span th:text="${session.loggedInUser.profile.fullName}"></span></a>
        <div class="d-flex">
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2"><i class="fa-solid fa-user me-1"></i>Hồ sơ</a>
            <a th:href="@{/logout}" class="btn btn-danger btn-sm"><i class="fa-solid fa-power-off"></i></a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row g-4 justify-content-center">
        <div class="col-md-5">
            <div class="card stat-card shadow-sm p-4 text-center h-100" onclick="location.href='/doctor/pending-appointments'">
                <div class="display-4 text-primary mb-3"><i class="fa-solid fa-hospital-user"></i></div>
                <h4 class="fw-bold">Hàng Chờ Khám</h4>
                <p class="text-muted">Tiếp nhận bệnh nhân đang chờ tại phòng khám.</p>
                <span class="btn btn-primary rounded-pill mt-auto">Vào Phòng Khám</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
