<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hàng Chờ Khám - Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364); min-height: 100vh; color: white; padding: 40px 0; }
        .glass-container { background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .patient-row { background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 15px; transition: 0.3s; border: 1px solid transparent; }
        .patient-row:hover { background: rgba(255,255,255,0.08); transform: scale(1.01); border-color: #38ef7d; }
        .btn-examine { background: linear-gradient(45deg, #11998e, #38ef7d); border: none; color: white; font-weight: bold; border-radius: 20px; padding: 8px 25px; box-shadow: 0 5px 15px rgba(56, 239, 125, 0.3); }
    </style>
</head>
<body>
<div class="container" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-info"><i class="fa-solid fa-users-viewfinder me-2"></i>Bệnh Nhân Chờ Khám</h3>
        <a href="/" class="btn btn-outline-light rounded-pill"><i class="fa-solid fa-house me-2"></i>Trang chủ</a>
    </div>

    <div th:if="${param.success}" class="alert alert-success bg-success bg-opacity-25 text-success border-success rounded-4 fw-bold mb-4">
        <i class="fa-solid fa-circle-check me-2"></i>Hoàn thành bệnh án thành công!
    </div>

    <div class="glass-container">
        <div th:each="a : ${appointments}" class="patient-row p-3 d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <div class="bg-info bg-opacity-25 text-info rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 50px; height: 50px; font-size: 20px;">
                    <i class="fa-solid fa-user-injured"></i>
                </div>
                <div>
                    <h5 class="mb-0 fw-bold" th:text="${a.patient.profile.fullName}"></h5>
                    <small class="opacity-50"><i class="fa-regular fa-clock me-1"></i>Hẹn lúc: <span th:text="${a.appointmentTime}"></span></small>
                </div>
            </div>
            <a th:href="@{/doctor/examine/{id}(id=${a.id})}" class="btn btn-examine">Khám Ngay <i class="fa-solid fa-stethoscope ms-2"></i></a>
        </div>
        <div th:if="${#lists.isEmpty(appointments)}" class="text-center py-5 opacity-50">
            <i class="fa-solid fa-mug-hot fs-1 mb-3"></i>
            <h5>Bác sĩ tuyệt vời! Không có bệnh nhân nào đang chờ.</h5>
        </div>
    </div>
</div>
</body>
</html>
